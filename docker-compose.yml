# Deployment for Unraid. Connects to the EXISTING Postgres container — this
# compose does NOT run its own database. Put real secrets in a .env file next
# to this compose (Unraid: the container's env vars), never in git.
#
# Build the images on the dev host with podman, e.g.:
#   podman build -t finance-tracker:latest .
#   podman build -t finance-tracker-mcp:latest -f Dockerfile.mcp .
# then deploy this stack on Unraid.

services:
  finance-tracker:
    image: finance-tracker:latest
    container_name: finance-tracker
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      APP_PASSWORD_HASH: ${APP_PASSWORD_HASH}
      PORT: "3000"
    ports:
      - "3000:3000" # web UI (LAN-only)
    networks:
      - finance

  # MCP server (LAN-only) — LLM access via a bearer token. Reuses the same
  # database; the web app runs the recurring scheduler, so this one does not.
  finance-mcp:
    image: finance-tracker-mcp:latest
    container_name: finance-mcp
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MCP_API_KEY: ${MCP_API_KEY}
      MCP_PORT: "3001"
    ports:
      - "3001:3001" # MCP endpoint (LAN-only; do NOT expose via a proxy)
    networks:
      - finance

# Attach to the network your existing Postgres container is on so the app can
# reach it by service/container name. Adjust the external network name to match
# your setup (e.g. the bridge your Postgres container uses on Unraid).
networks:
  finance:
    external: true
    name: finance-net
